name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          python -c "import httpx; print(httpx.__version__)"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run fixture validation demo
        run: python -m ed_platform.cli tests/fixtures/minimal_case --output-dir ci-validation-output

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ed-validation-artifacts
          path: ci-validation-output/
